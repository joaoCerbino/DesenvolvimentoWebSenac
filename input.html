<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina inputs</title>
</head>
<body>
    <fieldset>
        <legend>Dados Pessoais</legend>
    
        <label for="fname">Primeiro nome:</label><br>
        <input type="text" id="fname" name="fname" placeholder="Ex:João" required><br>

        <label for="iname">Segundo Nome:</label><br>
        <input type="text"  id="iname"name=iname placeholder="Ex:Cerbino" maxlength="15" size="10" required>
        <br>
      
        <button type="submit">Cadastrar</button>
        <button type="reset">EU SOU BURRO E ERREI KKKKKKKKK</button>
        <br>
        <input type="submit" value="ENVIAR">
        <br>
        <fieldset>
            <legend>Qual a sua linguagem de programação favorita</legend>
                
                <input type="radio" id="html" name="fav_language" value="HTML">
                <label for="html">HTML</label>
                <br>
                <input type="radio" id="css" name="fav_language" value="CSS">
                <label for="css">CSS</label>
                <br>
                <input type="radio" id="javaScript" name="fav_language" value="JAVASCRIPT">
                <label for="javaScript">JavaScript</label>
        </fieldset>
        <fieldset>
            <legend>Se você dizer mais que uma liguagem favorita</legend>
    
                <input type="checkbox" id="html" name="fav_language">
                <label for="html">HTML</label>
                <br>
                <input type="checkbox" id="css" name="fav_language">
                <label for="css">CSS</label>
                <br>
                <input type="checkbox" id="javaScript" name="fav_language">
                <label for="javaScript">JavaScript</label>
                <br>
        </fieldset>

        <fieldset>
            <legend>email</legend>
                <label for="email">email</label>
                <input type="email" id="email" placeholder="exemplo@exemplo.com">
                <br>
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="**********">

        </fieldset>
        <fieldset>
            <legend>DATA DE NASCIMENTO</legend>
            <label for="data">Selecione a Data de NASCIMENTO</label>
            <input type="date" id="data">

        </fieldset>
        <fieldset>
            <legend>Selecione o Horario</legend>
            <label for="horas">horas</label>
            <input type="time" id="horas">
        </fieldset>
        <fieldset>
            <legend>Selecione a data e <HR></HR></legend>
            <label for="dataehr">horas</label>
            <input type="datetime-local" id="dataehr">
        </fieldset>
        <fieldset>
            <legend>Selecione Sua Idade</legend>
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="18" max="25">
        </fieldset>
        <fieldset>
            <legend>Selecione sua Cor favorita</legend>
            <label for="cor">Selecione sua Cor favorita</label>
            <input type="color" name="Cor" id="cor">
        </fieldset>
        <fieldset>
            <legend>Manda foto do Pé KKKKKKKKK</legend>
            <label for="arquivo"></label>
            <input type="file" id="arquivo" name="arquivo" >
        </fieldset>
        <fieldset>
            <label for="pais">País</label>
            <select name="pais" id="pais">
                <option value="brasil">Brasil</option>
                <option value="eua">Estados Unidos</option>
                <option value="japão">Japão</option>
                <option value="n">Vim do abismo </option>
            </select>
            
        </fieldset>
        <fieldset>
            <label for="msm">Mensagem:</label><br>
            <textarea
                id="msm"
                name="msm"

                rows="5"
                cols="40"
                placeholder="Digite uma mensagem pros bandeirantes">
            </textarea>
            <!-- numero de linhas pertido
                cols numero de colunas permitido -->
        </fieldset>

    </fieldset>
        
     </form>
    
</body>
</html>
